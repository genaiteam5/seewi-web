<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEEWI</title>
<meta name="description" content="SEEWI — A Korean traditional archery lifestyle brand." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #F8F8F8;
    --fg: #191919;
    --hair: rgba(25, 25, 25, 0.14);
    --muted: rgba(25, 25, 25, 0.55);
    --pad-x: clamp(20px, 4vw, 56px);
    --t-fast: 240ms cubic-bezier(.22,.61,.36,1);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Space Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 400;
    letter-spacing: -0.06em;
    line-height: 1.3;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* ========== TOP NAV — fixed, 3 cols, blurred ========== */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 18px var(--pad-x);
    background: rgba(248, 248, 248, 0.78);
    backdrop-filter: saturate(150%) blur(10px);
    -webkit-backdrop-filter: saturate(150%) blur(10px);
  }
  .nav__left {
    display: flex;
    gap: 28px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__right { display: flex; justify-content: flex-end; }
  .nav__brand {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.02em;
    justify-self: center;
  }
  .nav__link, .nav__cta {
    font-size: 12.5px;
    opacity: 0.55;
    transition: opacity var(--t-fast);
    letter-spacing: 0;
  }
  .nav__link:hover, .nav__cta:hover { opacity: 1; }
  .nav__link.is-active { opacity: 1; }
  .nav__cta { opacity: 0.9; }

  /* ========== HOME LAYOUT ========== */
  .home {
    padding: 64px var(--pad-x) 40px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 48px;
  }
  .home__text { padding: 24px 0; }
  .home__logo {
    height: clamp(36px, 5vw, 64px);
    width: auto;
    margin: 0 0 28px;
  }
  .home__slogan {
    font-size: clamp(28px, 4vw, 52px);
    line-height: 1.1;
    margin: 0 0 22px;
    letter-spacing: -0.06em;
    font-weight: 400;
  }
  .home__copy {
    font-size: 11px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0;
  }

  .home__stage {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 640px;
    margin-left: auto;
  }
  .home__ring {
    position: absolute;
    inset: 0;
    border: 1px solid var(--hair);
    border-radius: 50%;
    pointer-events: none;
  }
  .bow-canvas {
    position: absolute;
    inset: 0;
    cursor: grab;
    touch-action: none;
  }
  .bow-canvas:active { cursor: grabbing; }
  .bow-canvas canvas { display: block; width: 100% !important; height: 100% !important; }

  .bow-loader {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  .bow-loader.is-hidden { opacity: 0; }
  .bow-loader__bar {
    display: block;
    width: 140px;
    height: 1px;
    background: var(--hair);
    position: relative;
    overflow: hidden;
  }
  .bow-loader__bar span {
    position: absolute; inset: 0;
    background: var(--fg);
    transform: translateX(-100%);
    animation: bowbar 1.6s ease-in-out infinite;
  }
  @keyframes bowbar {
    0%   { transform: translateX(-100%); }
    50%  { transform: translateX(0); }
    100% { transform: translateX(100%); }
  }
  .bow-loader__text {
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .bow-loader__text em { font-style: normal; color: var(--fg); }

  @media (max-width: 900px) {
    .home {
      grid-template-columns: 1fr;
      padding-top: 88px;
      gap: 24px;
    }
    .home__stage { margin: 0 auto; max-width: 480px; }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<nav class="nav" aria-label="Primary">
  <ul class="nav__left">
    <li><a href="./index.html" class="nav__link is-active" aria-current="page">Home</a></li>
    <li><a href="../product.html" class="nav__link">Product</a></li>
    <li><a href="https://genaiteam5.github.io/Gakgung/" target="_blank" rel="noopener noreferrer" class="nav__link">Simulation</a></li>
  </ul>
  <a href="#top" class="nav__brand">SEEWI</a>
  <div class="nav__right">
    <a href="https://genaiteam5.github.io/Gakgung/" target="_blank" rel="noopener noreferrer" class="nav__cta">Begin →</a>
  </div>
</nav>

<main id="top" class="home">
  <section class="home__text">
    <img class="home__logo" src="./assets/image/logo.png" alt="SEEWI" />
    <h1 class="home__slogan">Aim inward,<br/>find your stillness.</h1>
    <p class="home__copy">© 2026 SEЕWI ALL RIGHTS RESERVED</p>
  </section>
  <div class="home__stage">
    <div class="home__ring"></div>
    <div id="bowCanvas" class="bow-canvas" aria-label="Interactive 3D bow"></div>
    <div class="bow-loader" id="bowLoader">
      <span class="bow-loader__bar"><span></span></span>
      <span class="bow-loader__text">Loading model · <em id="bowPct">0%</em></span>
    </div>
  </div>
</main>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const stage = document.getElementById('bowCanvas');
  const loaderEl = document.getElementById('bowLoader');
  const pctEl = document.getElementById('bowPct');

  const scene = new THREE.Scene();
  scene.background = null;
  const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 1000);
  camera.position.set(0, 0, 3);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  stage.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(2, 3, 4); scene.add(key);
  const rim = new THREE.DirectionalLight(0xffffff, 0.5);
  rim.position.set(-3, 1, -2); scene.add(rim);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.minDistance = 1.2;
  controls.maxDistance = 6;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.6;
  renderer.domElement.addEventListener('pointerdown', () => { controls.autoRotate = false; });

  const gltfLoader = new GLTFLoader();
  gltfLoader.load(
    './assets/' + encodeURIComponent('활수정.glb'),
    (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      model.scale.setScalar(1.6 / maxDim);
      scene.add(model);
      loaderEl.classList.add('is-hidden');
    },
    (progress) => {
      if (progress.lengthComputable) {
        pctEl.textContent = Math.round((progress.loaded / progress.total) * 100) + '%';
      }
    },
    (err) => { console.error(err); pctEl.textContent = 'failed'; }
  );

  function resize() {
    const r = stage.getBoundingClientRect();
    const w = Math.max(1, r.width), h = Math.max(1, r.height);
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);
  new ResizeObserver(resize).observe(stage);

  function tick() {
    requestAnimationFrame(tick);
    controls.update();
    renderer.render(scene, camera);
  }
  tick();
</script>

</body>
</html>
