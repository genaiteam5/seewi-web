<!doctype html>
<html lang="ko">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #e3e3e3;
      color: #111;
      min-height: 100vh;
    }
    .topnav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 22px 36px;
      font-size: 14px;
      letter-spacing: 0.02em;
      gap: 16px;
    }
    .topnav-left { display: flex; gap: 28px; }
    .topnav a, .topnav span {
      color: #111;
      text-decoration: none;
      font-weight: 400;
    }
    .topnav a:hover { opacity: 0.6; }
    .topnav a.active { font-weight: 700; }
    .topnav-center {
      font-weight: 700;
      letter-spacing: 0.12em;
      justify-self: center;
    }
    .topnav-right {
      justify-self: end;
    }
    .page {
      padding: 64px 44px;
    }
    h1 { font-size: 32px; margin: 0 0 12px; }
    p.note { color: rgba(0,0,0,0.55); }
    @media (max-width: 900px) {
      .topnav { padding: 18px 20px; grid-template-columns: 1fr auto; }
      .topnav-right { display: none; }
      .topnav-left { gap: 18px; font-size: 13px; }
      .page { padding: 36px 20px; }
    }
  </style>
</head>

  <header class="topnav">
    <nav class="topnav-left">

    </nav>
    <span class="topnav-center">SEEWI</span>
    <a href="https://genaiteam5.github.io/Gakgung/" target="_blank" rel="noopener noreferrer" class="topnav-right">Begin →</a>
  </header>

  <main class="page">
    <h1>Product</h1>
    <p class="note">(제품 페이지 — 디자인 예정)</p>
